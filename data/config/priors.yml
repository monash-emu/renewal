durations:
  gen_mean:
    mean: 4.25
    sd: 0.75
    param_name: Generation time mean (days)
    short_name: generation time, mean
    evidence: We used analyses of case-contact transmission pairs from multiple different contexts for SARS-CoV-2 as the main evidence to quantify the mean generation time. Early case-contact data at the origin of the pandemic in Wuhan estimated a mean of around seven days prior to the implementation of population-wide public health and social measures, such as expanded contact tracing and movement restrictions. This led to a notable contraction of the mean generation time to around four to five days after these interventions had been implemented.[@chen2022] This study also found marked differences between the generation time and serial interval, due to changes in the epidemic that were sufficiently rapid to result in differences in the incubation period between infectors and infectees. Values of around four to five days are also consistent with an analysis from early 2020 from Tianjin, China and Singapore, in which estimates of the serial interval estimates were closer to that of the generation time[@ganyani2020]. Estimates of the serial interval from household clusters in Germany[@anderheiden2022] also found that values of four to five days were appropriate for wild-type, Alpha and Delta SARS-CoV-2 variants, although these appeared less applicable to Omicron. Estimates from close contacts in Spain similarly placed the serial interval of the Delta variant at around five days. [@delaguilamejia2022] A systematic review and meta-analysis of this area found more studies estimating the serial interval than the generation time, with mean estimates for the serial interval of 4.82 days, 3.59 days and 3.47 days for wild-type, Alpha and Delta respectively.[@xu2023] Estimates for the generation time were similar, but with wider confidence limits. A rapid review of on serial intervals found similar results.[@madewell2023] Results of individual studies from these systematic reviews estimated mean values for the serial interval from below three days to above six days. We therefore chose a prior distribution for the mean generation time of 4.25 days, with a standard deviation of 0.75 days.
  gen_sd:
    mean: 2.0
    sd: 0.5
    param_name: Generation time standard deviation (days)
    short_name: generation time, SD
    evidence: For the standard deviation of the generation interval, we used the same sources of evidence as for the mean.[@chen2022; @ganyani2020] The standard deviation estimates were typically in the range of two to four days for early Wuhan [@chen2022] and 1.5 to 2.5 days from Tianjin and Singapore.[@ganyani2020] The systematic review of mean serial intervals and generation times[@xu2023] focused on confidence intervals, rather than the standard deviations of the data of the individual studies, making these data less applicable to this parameter. As such, we chose a prior estimate for the standard deviation of the generation time of two days, with a distribution standard deviation of 0.5 days. 
  report_mean:
    mean: 8.0
    sd: 0.5
    param_name: Infection to reporting mean (days)
    short_name: time to notification, mean
    evidence: This delay incorporates the incubation period and the time from symptom onset to presentation to the health care system. The incubation period for COVID-19 has been estimated at five to seven days. We have previously estimated the delay from symptom onset to notification to be four days in the Australian context.[@trauer2024; @golding2023]
  report_sd: 
    mean: 3.0
    sd: 0.5
    param_name: Infection to reporting standard deviation (days)
    short_name: time to notification, SD
    evidence: Our previous estimate of four days for the time to reporting from symptom onset[@trauer2024] was associated with a standard deviation of two days.
  death_mean: 
    mean: 20.5
    sd: 5.0
    param_name: Infection to death mean (days)
    short_name: time to death, mean
    evidence: A meta-analysis of studies from China quantifying the mean duration from symptom onset to death found a mean delay of 15.93 days.[@khalili2020] A study leveraging individual-level data from Hubei, China in combination with early cases outside of China (not included in the meta-analysis) found a mean time from symptom onset to death of 17.8 days.[@verity2020] A cohort study from a north-eastern state of Brazil found a median 19 days from symptom onset to death.[@sousa2020] We considered 17.5 days to be a reasonable estimate for the time from symptom onset to death, which we increased by three days to account for the time from infection to symptom onset.
  death_sd:
    mean: 5.0
    sd: 2.5
    param_name: Infection to death standard deviation (days)
    short_name: time to death, SD
    evidence: The meta-analysis of studies from China introduced above[@khalili2020] found a range of symptom to death delays of 13.07 to 18.79 days, while the study from China[@verity2020] reported a credible interval of 16.9 to 19.2 days and the study from Brazil an interquartile range of 12 to 23 days.[@sousa2020]
  admit_mean:
    mean: 8.6
    sd: 3.0
    param_name: Infection to hospitalisation mean (days)
    short_name: time to admission, mean
    evidence: A study from Belgium reported the duration from symptom onset to hospitalisation to be 5.6 days (Table A.2 appears to provide the correct estimate).[@faes2020] Again, we inflated this for an incubation period of three days.
  admit_sd: 
    mean: 5.0
    sd: 2.0
    param_name: Infection to hospitalisation standard deviation (days)
    short_name: time to admission, SD
    evidence: The study from Belgium[@faes2020] above found considerable variation in the time to admission.
  stay_mean:
    mean: 15.0
    sd: 2.5
    param_name: Hospital admission duration (days)
    short_name: hospitalisation duration, mean
    evidence: A systematic review that synthesised hospital admission durations found a median stay of 14 days.[@rees2020] Although more studies were identified for China than for other countries, stay length in China appeared longer than for other countries. Another systematic review undertaken later in the pandemic period found similar durations, with a mean individual-level length of stay of 14.49 days.[@alimohamadi2022]
  stay_sd:
    mean: 7.92
    sd: 2.5
    param_name: Hospitalisation to discharge standard deviation (days)
    short_name: hospitalisation duration, SD
    evidence: The interquartile range reported in the first systematic review above[@rees2020] was ten to 19 days, while the individual-level standard deviation identified in the later systematic review above[@alimohamadi2022] was 7.92 days.
  icu_admit_mean:
    mean: 11.4
    sd: 7.0
    param_name: Infection to ICU admission mean (days)
    short_name: time to ICU admission, mean
    evidence: ISARIC report (Table 6) gives mean 2.8 days (6.1 days standard deviation) from hospital admission to ICU entry.
  icu_admit_sd: 
    mean: 5.0
    sd: 2.0
    param_name: Infection to ICU admission standard deviation (days)
    short_name: time to ICU admission, SD
    evidence: To populate
  icu_stay_mean:
    mean: 7.0
    sd: 3.0
    param_name: ICU admission duration mean (days)
    short_name: ICU duration, mean
    evidence: The systematic review introduced above[@rees2020] reported a median ICU length of stay outside of China of seven days with an interquartile range from four to 11 days.
  icu_stay_sd:
    mean: 5.0
    sd: 2.5
    param_name: ICU admission duration standard deviation (days)
    short_name: ICU duration, SD
    evidence: To populate, I think not reported by the Rees systematic review.
beta_from_summary:
  cdr:
    mean: 0.38
    std: 0.1
    param_name: Case detection proportion
    short_name: case detection proportion
    evidence: An early analysis from France of the proportion of cases detected estimated that 38% (95% confidence interval 35 to 44%) of cases were detected.[@pullano2020] This is consistent with our estimate that one in two to six cases were detected from the early stages of Australia's Omicron outbreak.[@trauer2024] Nevertheless, this quantity is difficult to determine with confidence and is likely highly context-dependent, hence our broad prior.
  har:
    mean: 0.0339
    std: 0.0059
    param_name: Infection hospitalisation proportion
    short_name: hospital admission proportion
    evidence: This quantity was estimated to be 3.39% (credible interval 2.79 to 3.97%) from officially reported data in England prior to the marked declines that occurred as population-wide vaccination was rolled out.[@ward2024]
  ifr:
    mean: 0.0079
    std: 0.0012
    param_name: Infection fatality proportion
    short_name: infection fatality proportion
    evidence: An analysis that integrated serosurveillance with age-specific death rates from 45 countries estimated an infection fatality rate of 0.79% (credible interval 0.68 to 0.92%) for the reference population of France,[@odriscoll2021] which would be expected to vary considerably by population age structure. Other groups have found similarly variable estimates using a combination of modelling and serosurvey results, including an overall IFR estimated at 0.49 to 2.53%.[@brazeau2022] Our prior estimate is relatively broadly distributed and so should be applicable to a range of higher income settings. 
  icuar:
    mean: 0.0079
    std: 0.0012
    param_name: ICU admission proportion
    short_name: ICU admission proportion
    evidence: to_populate
beta:
  cross_immunity:
    alpha: 10.0
    beta: 10.0
    param_name: Cross immunity
    short_name: cross immunity
    evidence: A meta-analysis found that protection against re-infection declined with time and varied with the variant considered, but was estimated at 78.6% (95% uncertainty interval 49.8 to 93.6%).[@covidforecasting2023] Our previous analysis of Australia's epidemic rapid succession of Omicron waves found high levels of immune escape.[@trauer2024]
