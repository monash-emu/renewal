durations:
  gen_mean:
    mean: 4.5
    sd: 0.5
    param_name: Generation time mean (days)
    evidence: Our preferred evidence for quantifying the generation interval come from analyses of transmission pairs that has been estimated in multiple different contexts for SARS-CoV-2.[@chen2022; @ganyani2020] Early case-contact data at the origin of the pandemic in Wuhan estimated a mean of around seven days prior to the implementation of population-wide public health and social measures such as contact tracing and movement restrictions. This led to a contraction of the mean generation interval to around four to five days after these interventions were implemented.[@chen2022] These findings are consistent with estimates from early 2020 from Tianjin, China and Singapore, which estimated generation intervals of around four and five days, respectively.[@ganyani2020]
  gen_sd:
    mean: 2.5
    sd: 0.5
    param_name: Generation time standard deviation (days)
    evidence: For the standard deviation of the generation interval, we used the same sources of evidence as for the mean.[@chen2022; @ganyani2020] The standard deviation estiamtes were typically in the range of two to four days for early Wuhan [@chen2022] and 1.5 to 2.5 days from Tianjin and Singapore.[@ganyani2020]
  report_mean:
    mean: 8.0
    sd: 0.5
    param_name: Infection to reporting mean (days)
    evidence: This delay incorporates the incubation period and the time from symptom onset to presentation to the health care system. The incubation period for COVID-19 has been estimated at five to seven days, with presentation assumed to take one to three days thereafter.
  report_sd: 
    mean: 3.0
    sd: 0.5
    param_name: Infection to reporting standard deviation (days)
    evidence: Pending
  death_mean: 
    mean: 20.5
    sd: 5.0
    param_name: Infection to death mean (days)
    evidence: A meta-analysis of studies from China quantifying the mean duration from symptom onset to death found a mean delay of 15.93 days.[@khalili2020] A study leveraging individual-level data from Hubei, China in combination with early cases outside of China (not included in the meta-analysis) found a mean time from symptom onset to death of 17.8 days.[@verity2020] A cohort study from a north-eastern state of Brazil found a median 19 days from symptom onset to death.[@sousa2020] We considered 17.5 days to be a reasonable estimate for the time from symptom onset to death, which we increased by three days to account for the time from infection to symptom onset.
  death_sd:
    mean: 5.0
    sd: 2.5
    param_name: Infection to death standard deviation (days)
    evidence: The meta-analysis of studies from China introduced above[@khalili2020] found a range of symptom to death delays of 13.07 to 18.79 days, while the study from China[@verity2020] reported a credible interval of 16.9 to 19.2 days and the study from Brazil an interquartile range of 12 to 23 days.[@sousa2020]
  admit_mean:
    mean: 8.6
    sd: 3.0
    param_name: Infection to hospitalisation mean (days)
    evidence: A study from Belgium reported the duration from symptom onset to hospitalisation to be 5.6 days (Table A.2 appears to provide the correct estimate).[@faes2020] Again, we inflated this for an incubation period of three days.
  admit_sd: 
    mean: 5.0
    sd: 2.0
    param_name: Infection to hospitalisation standard deviation (days)
    evidence: The study from Belgium[@faes2020] above found considerable variation in the time to admission.
  stay_mean:
    mean: 15.0
    sd: 2.5
    param_name: Hospital admission duration (days)
    evidence: A systematic review that synthesised hospital admission durations found a median stay of 14 days.[@rees2020] Although more studies were identified for China than for other countries, stay length in China appeared longer than for other countries. Another systematic review undertaken later in the pandemic period found similar durations, with a mean individual-level length of stay of 14.49 days.[@alimohamadi2022]
  stay_sd:
    mean: 7.92
    sd: 2.5
    param_name: Hospitalisation to discharge standard deviation (days)
    evidence: The interquartile range reported in the first systematic review above[@rees2020] was ten to 19 days, while the individual-level standard deviation identified in the later systematic review above[@alimohamadi2022] was 7.92 days.
beta:
  cdr:
    alpha: 5.0
    beta: 10.0
    param_name: Case detection proportion
    evidence: An early analysis from France of the proportion of cases detected estimated that 38% (95% confidence interval 35 to 44%) of cases were detected.[@pullano2020] This is consistent with our estimate that one in two to six cases were detected from the early stages of Australia's Omicron outbreak.[@trauer2024] Nevertheless, this quantity is difficult to determine with confidence and is likely highly context-dependent, hence our broad prior.
  har:
    alpha: 6.78
    beta: 186.64
    param_name: Infection hospitalisation proportion
    evidence: This quantity was estimated to be 3.39% (credible interval 2.79 to 3.97%) from officially reported data in England prior to the marked declines that occurred as population-wide vaccination was rolled out.[@ward2024]
  ifr:
    alpha: 7.9
    beta: 992.1
    param_name: Infection fatality proportion
    evidence: An analysis that integrated serosurveillance with age-specific death rates from 45 countries estimated an infection fatality rate of 0.79% (credible interval 0.68 to 0.92%) for the reference population of France, [@odriscoll2021] which would be expected to vary considerably by population age structure. Other groups have found similarly variable estimates using a combination of modelling and serosurvey results, including an overall IFR estimated at 0.49 to 2.53%.[@brazeau2022] Our prior estimate is relatively broadly distributed and so should be applicable to a range of higher income settings.
  cross_immunity:
    alpha: 10.0
    beta: 10.0
    param_name: Cross immunity
    evidence: A meta-analysis found that protection against re-infection declined with time and varied with the variant considered, but was estimated at 78.6% (95% uncertainty interval 49.8 to 93.6%).[@covidforecasting2023] Our previous analysis of Australia's epidemic rapid succession of Omicron waves found high levels of immune escape.[@trauer2024]
